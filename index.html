<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClaraCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-shell">
    <canvas id="gameCanvas" aria-label="Jogo sandbox em blocos"></canvas>

    <section class="hud" aria-live="polite">
      <h1>ClaraCraft</h1>
      <p>WASD: mover | Espaco: pular | X: bola de fogo | Clique esquerdo: minerar | Clique direito: colocar</p>
      <p>Teclas 1-6: trocar bloco da hotbar</p>
      <p>Modo construcao ativo: voce pode construir casas livremente</p>
      <p>Objetivo: colete todos os diamantes coloridos e so entao toque na bandeira final</p>
      <div id="hotbar" class="hotbar"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
