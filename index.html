<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClaraCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-shell">
    <canvas id="gameCanvas" aria-label="Jogo sandbox em blocos"></canvas>

    <section id="characterSelect" class="character-select" aria-label="Selecao de personagem">
      <div class="character-panel">
        <h2>Escolha Seu Personagem</h2>
        <p>Selecione 1 dos 5 personagens para iniciar a aventura.</p>
        <div class="character-grid">
          <button class="character-card" data-character="oldman">Velhinho Carismatico</button>
          <button class="character-card" data-character="girl">Menina de Vestido</button>
          <button class="character-card" data-character="boy">Menino de Bone e Bermuda</button>
          <button class="character-card" data-character="chubby">Gordo Gente Boa</button>
          <button class="character-card" data-character="explorer">Exploradora Rapida</button>
        </div>
      </div>
    </section>

    <section id="touchControls" class="touch-controls" aria-label="Controles touch">
      <div class="touch-left">
        <button class="touch-btn" data-key="a" aria-label="Mover para esquerda">Esq</button>
        <button class="touch-btn" data-key="d" aria-label="Mover para direita">Dir</button>
        <button class="touch-btn" data-key=" " aria-label="Pular">Pulo</button>
      </div>
      <div class="touch-right">
        <button class="touch-btn" data-action="fire" aria-label="Bola de fogo">Fogo</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
